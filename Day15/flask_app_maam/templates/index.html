<!doctype html>
<html>
<head>
    <title>Todo App</title>
</head>
<body>
    <h1>My Todo List</h1>

    <form method="post">
        <input type="text" name="title" placeholder="Task Title" required>
        <br><br>
        <textarea name="desc" placeholder="Task Description" required></textarea>
        <br><br>
        <button type="submit">Add Task</button>
    </form>

    <hr>

    <h2>Tasks</h2>

    {% if todos|length == 0 %}
        <p>No tasks yet</p>
    {% else %}
        <ul>
        {% for todo in todos %}
            <li>
                <b>{{ todo.title }}</b><br>
                {{ todo.desc }}<br>
                <small>{{ todo.date_added }}</small><br>
                <a href="/delete/{{ todo.id }}">Delete</a>
            </li>
            <hr>
        {% endfor %}
        </ul>
    {% endif %}
</body>
</html>
