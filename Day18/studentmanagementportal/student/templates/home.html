{% extends "base.html" %}

{% block content %}

<h2>All Students</h2>

<ul>
    {% for student in students %}
        <li>
            <a href="{% url 'student_detail' student.id %}">
                {{ student.name }}
            </a>
        </li>
    {% empty %}
        <li>No students found.</li>
    {% endfor %}
</ul>

{% endblock %}
